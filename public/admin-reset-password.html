<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — DEVSEAS Global</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .reset-card {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 40px;
            width: 400px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .header p {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 8px;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #475569;
        }

        input {
            width: 100%;
            padding: 12px 12px 12px 40px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            color: #fff;
            outline: none;
        }

        input:focus {
            border-color: #2dd4bf;
        }

        .btn-reset {
            width: 100%;
            padding: 12px;
            background: #2dd4bf;
            color: #0f172a;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-reset:hover {
            background: #14b6a6;
        }

        #message {
            text-align: center;
            font-size: 0.85rem;
            margin-bottom: 15px;
            display: none;
        }
    </style>
</head>

<body>
    <div class="reset-card">
        <div class="header">
            <h1>New Password</h1>
            <p>Set a strong password to secure your account</p>
        </div>

        <div id="message"></div>

        <form id="resetForm">
            <div class="form-group">
                <label>New Password</label>
                <div class="input-wrap">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="newPassword" placeholder="Minimum 6 characters" required minlength="6">
                </div>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <div class="input-wrap">
                    <i class="fas fa-check-double"></i>
                    <input type="password" id="confirmPassword" placeholder="Repeat new password" required>
                </div>
            </div>
            <button type="submit" class="btn-reset">Update Password</button>
        </form>
    </div>

    <script>
        const API_BASE_URL = (location.hostname === 'localhost' || location.hostname === '127.0.0.1') 
            ? '' 
            : 'https://devseas-backend.onrender.com';

        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            document.body.innerHTML = '<div style="text-align:center;"><h1>Invalid Link</h1><p>Reset token is missing.</p><br><a href="/admin-login.html" style="color:#2dd4bf">Back to Login</a></div>';
        }

        document.getElementById('resetForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmPassword').value;
            const msg = document.getElementById('message');

            if (newPass !== confirmPass) {
                msg.style.display = 'block';
                msg.style.color = '#ef4444';
                msg.textContent = 'Passwords do not match';
                return;
            }

            const btn = this.querySelector('button');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Updating...';
            btn.disabled = true;

            try {
                const response = await fetch(`${API_BASE_URL}/api/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword: newPass })
                });

                const data = await response.json();
                msg.style.display = 'block';

                if (response.ok) {
                    msg.style.color = '#2dd4bf';
                    msg.textContent = 'Success! Redirecting to login...';
                    setTimeout(() => window.location.href = '/admin-login.html', 2000);
                } else {
                    msg.style.color = '#ef4444';
                    msg.textContent = data.error || 'Reset failed';
                    btn.innerHTML = 'Update Password';
                    btn.disabled = false;
                }
            } catch (error) {
                msg.style.display = 'block';
                msg.style.color = '#ef4444';
                msg.textContent = 'Network error. Try again.';
                btn.innerHTML = 'Update Password';
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
